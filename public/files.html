<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的文件</title>

    <style>
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 40px;
            color: #222;
        }

        .box {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h2 {
            margin: 0;
            font-size: 32px;
        }

        .upload-area {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 22px;
            background: #f0f4ff;
            border-radius: 10px;
            margin-bottom: 28px;
        }

        button,
        .download,
        .preview {
            border: none;
            padding: 9px 16px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            color: white;
        }

        .btn-upload {
            background: #2563eb;
        }

        .btn-logout {
            background: #555;
        }

        .btn-delete {
            background: #dc2626;
        }

        .download {
            background: #16a34a;
        }

        .preview {
            background: #7c3aed;
        }

            button:hover,
            .download:hover,
            .preview:hover {
                opacity: 0.85;
            }

        #msg {
            min-height: 24px;
            color: #2563eb;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h3 {
            margin-top: 30px;
            font-size: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: white;
        }

        th,
        td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #f9fafb;
            color: #555;
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 48px;
            background: #fafafa;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 18px;
        }

        /* 预览弹窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
        }

        .modal-content {
            background: white;
            width: 86%;
            height: 86%;
            margin: 35px auto;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 14px 18px;
            background: #111827;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #previewTitle {
            font-size: 16px;
            font-weight: bold;
            word-break: break-all;
        }

        .modal-body {
            flex: 1;
            background: #f3f4f6;
        }

            .modal-body iframe {
                width: 100%;
                height: 100%;
                border: none;
                background: white;
            }

        .close-btn {
            background: #dc2626;
            color: white;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="top">
            <h2>我的文件</h2>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>

        <div class="upload-area">
            <input type="file" id="file">
            <button class="btn-upload" onclick="uploadFile()">上传文件</button>
        </div>

        <p id="msg"></p>

        <h3>文件列表</h3>

        <div id="fileArea">
            <div class="empty">正在加载文件...</div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="previewTitle">文件预览</span>
                <button class="close-btn" onclick="closePreview()">关闭</button>
            </div>

            <div class="modal-body">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://file-system-demo-production.up.railway.app";

        async function uploadFile() {
            const fileInput = document.getElementById("file");
            const msg = document.getElementById("msg");

            if (!fileInput.files[0]) {
                alert("请先选择文件");
                return;
            }

            msg.innerText = "正在上传...";

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const res = await fetch(API_BASE + "/api/upload", {
                    method: "POST",
                    credentials: "include",
                    body: formData
                });

                const data = await res.json();

                if (res.ok) {
                    msg.innerText = "上传成功";
                    fileInput.value = "";
                    loadFiles();
                } else {
                    msg.innerText = data.error || "上传失败";
                }
            } catch (error) {
                msg.innerText = "上传请求失败：" + error.message;
            }
        }

        async function loadFiles() {
            const fileArea = document.getElementById("fileArea");

            try {
                const res = await fetch(API_BASE + "/api/files", {
                    credentials: "include"
                });

                if (res.status === 401) {
                    fileArea.innerHTML = `<div class="empty">未登录，请重新登录</div>`;
                    return;
                }

                if (!res.ok) {
                    fileArea.innerHTML = `<div class="empty">读取文件失败，状态码：${res.status}</div>`;
                    return;
                }

                const files = await res.json();

                if (files.length === 0) {
                    fileArea.innerHTML = `<div class="empty">暂无文件，请先上传</div>`;
                    return;
                }

                fileArea.innerHTML = `
              <table>
                <thead>
                  <tr>
                    <th>文件名</th>
                    <th>大小</th>
                    <th>上传时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  ${files.map(function (file) {
                    return `
                      <tr>
                        <td>${escapeHtml(file.original_name)}</td>
                        <td>${formatSize(file.size)}</td>
                        <td>${file.uploaded_at}</td>
                        <td>
                          <div class="actions">
                            <button class="preview" onclick="previewFile(${file.id}, '${escapeForJs(file.original_name)}')">预览</button>
                            <a class="download" href="${API_BASE}/api/download/${file.id}" target="_blank">下载</a>
                            <button class="btn-delete" onclick="deleteFile(${file.id})">删除</button>
                          </div>
                        </td>
                      </tr>
                    `;
                }).join("")}
                </tbody>
              </table>
            `;
            } catch (error) {
                fileArea.innerHTML = `<div class="empty">请求失败：${error.message}</div>`;
                console.error(error);
            }
        }

        async function deleteFile(id) {
            if (!confirm("确定删除这个文件吗？")) {
                return;
            }

            try {
                const res = await fetch(API_BASE + "/api/file/" + id, {
                    method: "DELETE",
                    credentials: "include"
                });

                const data = await res.json();

                if (res.ok) {
                    document.getElementById("msg").innerText = "删除成功";
                    loadFiles();
                } else {
                    document.getElementById("msg").innerText = data.error || "删除失败";
                }
            } catch (error) {
                document.getElementById("msg").innerText = "删除请求失败：" + error.message;
            }
        }

        function previewFile(id, name) {
            const lowerName = name.toLowerCase();

            const canPreview =
                lowerName.endsWith(".pdf") ||
                lowerName.endsWith(".png") ||
                lowerName.endsWith(".jpg") ||
                lowerName.endsWith(".jpeg") ||
                lowerName.endsWith(".gif") ||
                lowerName.endsWith(".txt");

            if (!canPreview) {
                alert("该文件类型暂不支持在线预览，请点击下载查看。");
                return;
            }

            document.getElementById("previewTitle").innerText = name;
            document.getElementById("previewFrame").src = API_BASE + "/api/preview/" + id;
            document.getElementById("previewModal").style.display = "block";
        }

        function closePreview() {
            document.getElementById("previewFrame").src = "";
            document.getElementById("previewModal").style.display = "none";
        }

        async function logout() {
            await fetch(API_BASE + "/api/logout", {
                method: "POST",
                credentials: "include"
            });

            window.location.href = "login.html";
        }

        function formatSize(size) {
            if (!size) return "-";
            if (size < 1024) return size + " B";
            if (size < 1024 * 1024) return (size / 1024).toFixed(1) + " KB";
            return (size / 1024 / 1024).toFixed(1) + " MB";
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeForJs(text) {
            return String(text)
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/"/g, "&quot;")
                .replace(/\n/g, " ");
        }

        loadFiles();
    </script>
</body>
</html>
